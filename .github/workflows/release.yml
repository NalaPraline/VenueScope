name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Force dalamud.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        run: dotnet build --configuration Release VenueScope.sln

      - name: Package plugin
        run: |
          $dll = Get-ChildItem -Recurse -Filter "VenueScope.dll" | Where-Object { $_.FullName -like "*Release*" } | Select-Object -First 1
          if (-not $dll) { Write-Error "DLL not found!"; exit 1 }
          $dir = $dll.DirectoryName
          $files = Get-ChildItem $dir | Where-Object { $_.Extension -ne ".zip" }
          Compress-Archive -Path ($files.FullName) -DestinationPath "latest.zip" -Force

      - name: Determine release type
        id: reltype
        run: |
          if ("${{ github.ref_name }}" -match "-testing$") {
            echo "type=testing" >> $env:GITHUB_OUTPUT
          } else {
            echo "type=latest" >> $env:GITHUB_OUTPUT
          }

      - name: Publish to puni.sh
        uses: PunishXIV/dynamis-action@v2
        with:
          plugin_id: "122"
          internal_name: "VenueScope"
          path: "latest.zip"
          type: ${{ steps.reltype.outputs.type }}
          changelog: "Fix Lifestream teleport code for locations with colons."
        env:
          PUBLISHER_KEY: ${{ secrets.PUNI_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          generate_release_notes: true
          prerelease: false
