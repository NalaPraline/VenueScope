name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Force dalamud.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        run: dotnet build --configuration Release

      - name: Package plugin
        run: |
          $dll = Get-ChildItem -Recurse -Filter "VenueScope.dll" | Where-Object { $_.FullName -like "*Release*" } | Select-Object -First 1
          if (-not $dll) { Write-Error "DLL not found!"; exit 1 }
          $dir = $dll.DirectoryName
          $files = Get-ChildItem $dir | Where-Object { $_.Extension -ne ".zip" }
          Compress-Archive -Path ($files.FullName) -DestinationPath "latest.zip" -Force

      - name: Update pluginmaster.json
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          $content = Get-Content docs/pluginmaster.json -Raw
          $content = $content -replace '"AssemblyVersion":\s*"[^"]*"', "`"AssemblyVersion`": `"$version`""
          Set-Content docs/pluginmaster.json -Value $content -Encoding UTF8 -NoNewline
          git add docs/pluginmaster.json
          git diff --cached --quiet || git commit -m "chore: bump pluginmaster.json to ${{ github.ref_name }}"
          git push origin main

      - name: Publish to puni.sh
        uses: PunishXIV/dynamis-action@v2
        with:
          plugin_id: "122"
          internal_name: "VenueScope"
          path: "latest.zip"
          type: "testing"
        env:
          PUBLISHER_KEY: ${{ secrets.PUNI_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          generate_release_notes: true
