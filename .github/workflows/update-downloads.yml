name: Update Download Count

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:         # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute total downloads
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(gh api repos/NalaPraline/VenueScope/releases --paginate \
            --jq '[.[].assets[] | select(.name == "latest.zip") | .download_count] | add // 0')
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Update pluginmaster.json
        run: |
          total="${{ steps.count.outputs.total }}"
          sed -i "s/\"DownloadCount\":[[:space:]]*[0-9]*/\"DownloadCount\": $total/" docs/pluginmaster.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/pluginmaster.json && exit 0
          git add docs/pluginmaster.json
          git commit -m "chore: update download count"
          git push origin main
